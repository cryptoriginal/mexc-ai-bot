services:
  - type: web
    name: mexc-scalping-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    envVars:
      - key: TELEGRAM_TOKEN
        fromGroup: telegram-bot
      - key: MEXC_API_KEY
        fromGroup: mexc-api
      - key: MEXC_SECRET_KEY
        fromGroup: mexc-api
